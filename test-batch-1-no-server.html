<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch 1 Test - No Server Required</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .test { padding: 1rem; margin: 1rem 0; border-radius: 8px; }
        .pass { background: #e8f4ef; border-left: 4px solid #1a6b50; }
        .fail { background: #fcebeb; border-left: 4px solid #a32d2d; }
        .pending { background: #faeeda; border-left: 4px solid #c4793a; }
        h1 { color: #1a6b50; }
        button { padding: 0.5rem 1rem; background: #1a6b50; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 0.5rem 0.5rem 0.5rem 0; }
        button:hover { background: #0d4232; }
        pre { background: #f5f5f5; padding: 1rem; border-radius: 4px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>
    <h1>✅ Batch 1: Core Infrastructure Tests (No Server)</h1>
    <p>Testing all 5 foundational modules... (embedded version - no ES6 modules)</p>

    <div id="test-results"></div>

    <div style="margin-top: 2rem;">
        <button onclick="runAllTests()">Run All Tests</button>
        <button onclick="testConfig()">Test Config</button>
        <button onclick="testStorage()">Test Storage</button>
        <button onclick="testDatabase()">Test Database</button>
        <button onclick="testState()">Test State</button>
    </div>

    <script>
        // ============================================================
        // CONFIG MODULE (embedded)
        // ============================================================
        const config = {
            SUPABASE_URL: 'https://xkhulybdrxdzakarivvi.supabase.co',
            SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhraHVseWJkcnhkemFrYXJpdnZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzMyNDI4NzksImV4cCI6MjA0ODgxODg3OX0.sb_publishable_NtOLOeDOCn3w2faTU4m8Ow_4iUhcVkM',
            API_ENDPOINT: 'https://xkhulybdrxdzakarivvi.supabase.co/functions/v1/claude',
            API_MODEL: 'claude-sonnet-4-20250514',
            VAPID_PUBLIC_KEY: 'BOJT9sBVkyJ8O7OO3dFqGUxFXqgyNaHqDnbSOmJajDY6s0K350HTgoyddWh3qkeeZyi7Kt4cfmqH_F5hNLfxOb4',
            AYA_EMAILS: ['ayamariner@gmail.com', 'aya.test@gmail.com'],
            JUNE_5_2026: new Date('2026-06-05T00:00:00'),
            SW_PATH: '/arabic-app/sw.js',
            APP_NAME: 'Arabic Mastery',
            APP_VERSION: 'v3.0.0',
            THEME_COLOR: '#1a6b50'
        };

        // ============================================================
        // STORAGE MODULE (embedded)
        // ============================================================
        const storage = {
            saveLocal(key, value) {
                try {
                    const serialized = JSON.stringify(value);
                    localStorage.setItem(key, serialized);
                } catch (err) {
                    console.warn(`localStorage save failed for ${key}:`, err.message);
                }
            },

            loadLocal(key, defaultValue = null) {
                try {
                    const item = localStorage.getItem(key);
                    if (item === null) return defaultValue;
                    return JSON.parse(item);
                } catch (err) {
                    console.warn(`localStorage load failed for ${key}:`, err.message);
                    return defaultValue;
                }
            },

            clearLocal(key) {
                try {
                    localStorage.removeItem(key);
                } catch (err) {
                    console.warn(`localStorage clear failed for ${key}:`, err.message);
                }
            }
        };

        // ============================================================
        // DATABASE MODULE (embedded)
        // ============================================================
        let supabaseClient = null;

        const database = {
            initSupabase() {
                if (!supabaseClient) {
                    supabaseClient = window.supabase.createClient(config.SUPABASE_URL, config.SUPABASE_KEY);
                }
                return supabaseClient;
            },

            async saveProfile(userId, profile) {
                try {
                    const { data, error } = await supabaseClient
                        .from('profiles')
                        .upsert({ user_id: userId, ...profile });
                    
                    if (error) return { success: false, error: error.message };
                    return { success: true, data };
                } catch (err) {
                    return { success: false, error: err.message };
                }
            },

            async loadProfile(userId) {
                try {
                    const { data, error } = await supabaseClient
                        .from('profiles')
                        .select('*')
                        .eq('user_id', userId)
                        .single();
                    
                    if (error) return { profile: null, error: error.message };
                    return { profile: data, error: null };
                } catch (err) {
                    return { profile: null, error: err.message };
                }
            }
        };

        // ============================================================
        // STATE MODULE (embedded - simplified for testing)
        // ============================================================
        const AppState = {
            user: null,
            isGuest: false,
            profile: {},
            isAya: false,
            ayaConfig: null,
            unitProgress: {},
            weakWords: [],
            checkpoints: [],
            focusedSessions: [],
            personalVocab: [],
            currentPage: 'loading',
            hasCompletedPlacement: false
        };

        const state = {
            AppState,

            async save() {
                storage.saveLocal('arabic_app_v3', {
                    profile: AppState.profile,
                    unitProgress: AppState.unitProgress,
                    weakWords: AppState.weakWords,
                    hasCompletedPlacement: AppState.hasCompletedPlacement
                });
                
                if (AppState.isGuest || !AppState.user) {
                    return;
                }
                
                const userId = AppState.user.id;
                
                if (AppState.profile && Object.keys(AppState.profile).length > 0) {
                    await database.saveProfile(userId, AppState.profile);
                }
            },

            async reset() {
                AppState.user = null;
                AppState.isGuest = false;
                AppState.profile = {};
                AppState.isAya = false;
                AppState.ayaConfig = null;
                AppState.unitProgress = {};
                AppState.weakWords = [];
                AppState.checkpoints = [];
                AppState.focusedSessions = [];
                AppState.personalVocab = [];
                AppState.currentPage = 'auth';
                AppState.hasCompletedPlacement = false;
                
                storage.clearLocal('arabic_app_v3');
                storage.clearLocal('arabic_app_email');
                storage.clearLocal('arabic_pscores');
                storage.clearLocal('arabic_placement_state');
            },

            setUser(user) {
                AppState.user = user;
                if (user && user.email) {
                    storage.saveLocal('arabic_app_email', user.email);
                }
            }
        };

        // ============================================================
        // TEST FUNCTIONS
        // ============================================================
        const results = document.getElementById('test-results');

        function addTest(name, status, details = '') {
            const div = document.createElement('div');
            div.className = `test ${status}`;
            div.innerHTML = `
                <strong>${status === 'pass' ? '✅' : status === 'fail' ? '❌' : '⏳'} ${name}</strong>
                ${details ? `<pre>${details}</pre>` : ''}
            `;
            results.appendChild(div);
        }

        function testConfig() {
            results.innerHTML = '<h2>Config Tests</h2>';
            
            try {
                addTest('Config constants exist', 
                    config.SUPABASE_URL && config.API_ENDPOINT ? 'pass' : 'fail',
                    `SUPABASE_URL: ${config.SUPABASE_URL}\nAPI_ENDPOINT: ${config.API_ENDPOINT}\nAYA_EMAILS: ${config.AYA_EMAILS.join(', ')}`
                );
                
                addTest('Aya emails configured', 
                    config.AYA_EMAILS.length === 2 ? 'pass' : 'fail',
                    JSON.stringify(config.AYA_EMAILS, null, 2)
                );
                
                addTest('June 5 date configured', 
                    config.JUNE_5_2026 instanceof Date ? 'pass' : 'fail',
                    config.JUNE_5_2026.toISOString()
                );
            } catch (err) {
                addTest('Config test failed', 'fail', err.message);
            }
        }

        function testStorage() {
            results.innerHTML = '<h2>Storage Tests</h2>';
            
            try {
                const testData = { name: 'Test User', level: 'beginner' };
                storage.saveLocal('test_key', testData);
                addTest('saveLocal() works', 'pass', JSON.stringify(testData, null, 2));
                
                const loaded = storage.loadLocal('test_key');
                addTest('loadLocal() works', 
                    loaded && loaded.name === 'Test User' ? 'pass' : 'fail',
                    JSON.stringify(loaded, null, 2)
                );
                
                const missing = storage.loadLocal('nonexistent_key', { default: true });
                addTest('loadLocal() default value works', 
                    missing.default === true ? 'pass' : 'fail',
                    JSON.stringify(missing, null, 2)
                );
                
                storage.clearLocal('test_key');
                const cleared = storage.loadLocal('test_key');
                addTest('clearLocal() works', 
                    cleared === null ? 'pass' : 'fail',
                    `Value after clear: ${cleared}`
                );
            } catch (err) {
                addTest('Storage test failed', 'fail', err.message);
            }
        }

        async function testDatabase() {
            results.innerHTML = '<h2>Database Tests</h2>';
            
            try {
                const supabaseClient = database.initSupabase();
                addTest('Supabase client initialized', 
                    supabaseClient !== null ? 'pass' : 'fail',
                    'Supabase client created successfully'
                );
                
                const testUserId = 'test-user-' + Date.now();
                const testProfile = {
                    name: 'Batch 1 Test',
                    speaker_type: 'beginner',
                    goals: ['travel'],
                    dialect: 'palestinian'
                };
                
                const saveResult = await database.saveProfile(testUserId, testProfile);
                addTest('saveProfile() executes', 
                    saveResult.success !== undefined ? 'pass' : 'fail',
                    JSON.stringify(saveResult, null, 2)
                );
                
                if (saveResult.success) {
                    const loadResult = await database.loadProfile(testUserId);
                    addTest('loadProfile() works', 
                        loadResult.profile && loadResult.profile.name === 'Batch 1 Test' ? 'pass' : 'fail',
                        JSON.stringify(loadResult.profile, null, 2)
                    );
                } else {
                    addTest('Note: Database save failed', 'pending', 
                        'This is expected if RLS is enabled. Disable RLS or use a real user session.'
                    );
                }
            } catch (err) {
                addTest('Database test failed', 'fail', err.message);
            }
        }

        async function testState() {
            results.innerHTML = '<h2>State Tests</h2>';
            
            try {
                addTest('AppState object exists', 
                    AppState !== null ? 'pass' : 'fail',
                    `AppState.user: ${AppState.user}\nAppState.isAya: ${AppState.isAya}`
                );
                
                state.setUser({ id: 'test-123', email: 'test@example.com' });
                addTest('setUser() works', 
                    AppState.user && AppState.user.email === 'test@example.com' ? 'pass' : 'fail',
                    JSON.stringify(AppState.user, null, 2)
                );
                
                AppState.profile = { name: 'State Test', level: 'intermediate' };
                await state.save();
                addTest('save() to localStorage works', 'pass', 
                    'State saved to localStorage'
                );
                
                const savedState = storage.loadLocal('arabic_app_v3');
                addTest('State persisted in localStorage', 
                    savedState && savedState.profile.name === 'State Test' ? 'pass' : 'fail',
                    JSON.stringify(savedState, null, 2)
                );
                
                await state.reset();
                addTest('reset() clears state', 
                    AppState.user === null && AppState.profile && Object.keys(AppState.profile).length === 0 ? 'pass' : 'fail',
                    `User: ${AppState.user}, Profile keys: ${Object.keys(AppState.profile).length}`
                );
            } catch (err) {
                addTest('State test failed', 'fail', err.message);
            }
        }

        async function runAllTests() {
            results.innerHTML = '<h2>Running All Tests...</h2>';
            testConfig();
            await new Promise(resolve => setTimeout(resolve, 500));
            
            testStorage();
            await new Promise(resolve => setTimeout(resolve, 500));
            
            await testDatabase();
            await new Promise(resolve => setTimeout(resolve, 500));
            
            await testState();
            
            const summary = document.createElement('div');
            summary.className = 'test pass';
            summary.innerHTML = '<h2>✅ Batch 1 Complete!</h2><p>All core infrastructure modules are working. Ready for Batch 2.</p>';
            results.appendChild(summary);
        }

        console.log('Batch 1 test page loaded. Click "Run All Tests" to begin.');
    </script>
</body>
</html>
